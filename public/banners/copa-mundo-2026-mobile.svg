<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Barlow+Condensed:wght@700;900&amp;display=swap');
    </style>
    <linearGradient id="bg2m" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold2m" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow2m" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.20"/>
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow3m">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dotsm" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="rgba(255,255,255,0.04)"/>
    </pattern>
  </defs>

  <!-- Fundo -->
  <rect width="400" height="400" fill="url(#bg2m)" rx="16"/>
  <rect width="400" height="400" fill="url(#dotsm)" rx="16"/>

  <!-- Glow decorativo (canto inferior direito) -->
  <ellipse cx="340" cy="340" rx="130" ry="130" fill="url(#glow2m)" opacity="0.8"/>

  <!-- Globo estilizado (canto inferior direito) -->
  <circle cx="340" cy="340" r="90" fill="none" stroke="rgba(255,215,0,0.12)" stroke-width="1.5"/>
  <circle cx="340" cy="340" r="65" fill="none" stroke="rgba(255,215,0,0.08)" stroke-width="1"/>
  <ellipse cx="340" cy="340" rx="36" ry="90" fill="none" stroke="rgba(255,215,0,0.10)" stroke-width="1"/>
  <ellipse cx="340" cy="340" rx="90" ry="32" fill="none" stroke="rgba(255,215,0,0.08)" stroke-width="1"/>

  <!-- Estrelas decorativas -->
  <text x="290" y="265" font-size="14" fill="rgba(255,215,0,0.40)">★</text>
  <text x="355" y="248" font-size="10" fill="rgba(255,215,0,0.28)">★</text>
  <text x="378" y="292" font-size="16" fill="rgba(255,215,0,0.32)">★</text>
  <text x="308" y="300" font-size="8"  fill="rgba(255,215,0,0.22)">★</text>

  <!-- Badge superior -->
  <rect x="100" y="32" width="200" height="28" rx="14" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.35)" stroke-width="1"/>
  <text x="200" y="51" font-family="'Barlow Condensed', sans-serif" font-size="12" font-weight="700" fill="#FCD34D" text-anchor="middle" letter-spacing="3">🌍 MUNDIAL 2026</text>

  <!-- Título principal (centralizado) -->
  <text x="200" y="108" font-family="'Bebas Neue', sans-serif" font-size="38" fill="white" filter="url(#glow3m)" letter-spacing="2" text-anchor="middle">BOLÃO DA</text>
  <text x="200" y="170" font-family="'Bebas Neue', sans-serif" font-size="46" fill="url(#gold2m)" filter="url(#glow3m)" letter-spacing="2" text-anchor="middle">COPA DO MUNDO</text>
  <text x="200" y="224" font-family="'Bebas Neue', sans-serif" font-size="42" fill="rgba(255,255,255,0.85)" letter-spacing="3" text-anchor="middle">2026 🏆</text>

  <!-- Subtítulo -->
  <text x="200" y="258" font-family="'Barlow Condensed', sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.60)" letter-spacing="1" text-anchor="middle">48 SELEÇÕES · MILHARES DE PALPITES</text>

  <!-- CTA Button -->
  <rect x="70" y="278" width="260" height="46" rx="23" fill="url(#gold2m)"/>
  <text x="200" y="307" font-family="'Bebas Neue', sans-serif" font-size="19" fill="#1a1a2e" text-anchor="middle" letter-spacing="1">🌟 CRIAR MEU BOLÃO</text>
</svg>
