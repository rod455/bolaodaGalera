<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Barlow+Condensed:wght@700;900&amp;display=swap');
    </style>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="rgba(255,255,255,0.04)"/>
    </pattern>
  </defs>

  <!-- Fundo -->
  <rect width="800" height="300" fill="url(#bg2)" rx="16"/>
  <rect width="800" height="300" fill="url(#dots)" rx="16"/>

  <!-- Glow decorativo -->
  <ellipse cx="690" cy="150" rx="130" ry="130" fill="url(#glow2)" opacity="0.7"/>

  <!-- Globo estilizado -->
  <circle cx="690" cy="150" r="80" fill="none" stroke="rgba(255,215,0,0.12)" stroke-width="1.5"/>
  <circle cx="690" cy="150" r="58" fill="none" stroke="rgba(255,215,0,0.08)" stroke-width="1"/>
  <ellipse cx="690" cy="150" rx="32" ry="80" fill="none" stroke="rgba(255,215,0,0.1)" stroke-width="1"/>
  <ellipse cx="690" cy="150" rx="80" ry="28" fill="none" stroke="rgba(255,215,0,0.08)" stroke-width="1"/>
  <line x1="610" y1="150" x2="770" y2="150" stroke="rgba(255,215,0,0.08)" stroke-width="1"/>

  <!-- Estrelas -->
  <text x="610" y="85"  font-size="16" fill="rgba(255,215,0,0.45)">★</text>
  <text x="720" y="68"  font-size="11" fill="rgba(255,215,0,0.30)">★</text>
  <text x="755" y="108" font-size="20" fill="rgba(255,215,0,0.38)">★</text>
  <text x="638" y="115" font-size="9"  fill="rgba(255,215,0,0.25)">★</text>
  <text x="768" y="170" font-size="14" fill="rgba(255,215,0,0.32)">★</text>
  <text x="655" y="210" font-size="12" fill="rgba(255,215,0,0.28)">★</text>

  <!-- Badge superior -->
  <rect x="100" y="36" width="220" height="28" rx="14" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.35)" stroke-width="1"/>
  <text x="210" y="56" font-family="'Barlow Condensed', sans-serif" font-size="13" font-weight="700" fill="#FCD34D" text-anchor="middle" letter-spacing="3">🌍 MUNDIAL 2026</text>

  <!-- Título principal -->
  <text x="98" y="115" font-family="'Bebas Neue', sans-serif" font-size="44" fill="white" filter="url(#glow3)" letter-spacing="2">BOLÃO DA</text>
  <text x="98" y="175" font-family="'Bebas Neue', sans-serif" font-size="56" fill="url(#gold2)" filter="url(#glow3)" letter-spacing="2">COPA DO MUNDO</text>
  <text x="98" y="215" font-family="'Bebas Neue', sans-serif" font-size="40" fill="rgba(255,255,255,0.85)" letter-spacing="3">2026 🏆</text>

  <!-- Subtítulo -->
  <text x="100" y="238" font-family="'Barlow Condensed', sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,0.65)" letter-spacing="1">32 SELEÇÕES · MILHARES DE PALPITES · UM CAMPEÃO</text>

  <!-- CTA Button -->
  <rect x="100" y="252" width="220" height="34" rx="17" fill="url(#gold2)"/>
  <text x="210" y="274" font-family="'Bebas Neue', sans-serif" font-size="18" fill="#1a1a2e" text-anchor="middle" letter-spacing="1">🌟 CRIAR MEU BOLÃO</text>
</svg>
