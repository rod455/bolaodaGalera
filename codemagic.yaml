workflows:
  ios-release:
    name: iOS Release - App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Bolao na Copa

    environment:
      vars:
        BUNDLE_ID: com.bolaonacopa.app
        XCODE_SCHEME: App
        TEAM_ID: GGM89XNN4S
      node: 22.0.0
      xcode: latest

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'ios-v*'
          include: true

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Remove server URL for iOS
        script: |
          set -ex
          # iOS deve carregar o bundle local (dist/), não URL remota
          # A Apple rejeita apps que crasham se o servidor não responde
          cd ios/App/App
          python3 -c "
          import json
          with open('capacitor.config.json', 'r') as f:
              config = json.load(f)
          if 'server' in config and 'url' in config['server']:
              del config['server']['url']
          with open('capacitor.config.json', 'w') as f:
              json.dump(config, f, indent=2)
          print('Removed server.url from capacitor.config.json for iOS')
          "
          cat capacitor.config.json

      - name: Setup iOS code signing
        script: |
          set -ex
          # Generate RSA private key for certificate creation
          openssl genrsa -out /tmp/cert_key.pem 2048
          export CERTIFICATE_PRIVATE_KEY="$(cat /tmp/cert_key.pem)"

          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles --project ios/App/App.xcodeproj

      - name: Set version
        script: |
          cd ios/App
          agvtool new-marketing-version 1.5.0
          agvtool new-version -all 31

      - name: Build IPA
        script: |
          set -ex
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
