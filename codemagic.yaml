workflows:
  ios-release:
    name: iOS Release - App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Bolao na Copa

    environment:
      vars:
        BUNDLE_ID: com.bolaonacopa.app
        XCODE_SCHEME: App
        TEAM_ID: GGM89XNN4S
      node: 22.0.0
      xcode: latest

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'ios-v*'
          include: true

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Add RevenueCat to Package.swift
        script: |
          set -ex
          cd ios/App/CapApp-SPM
          # Verificar se RevenueCat já está no Package.swift
          if ! grep -q "RevenuecatPurchasesCapacitor" Package.swift; then
            echo "Adding RevenueCat to Package.swift..."
            # Adicionar dependency
            sed -i '' 's|.package(name: "CapacitorFilesystem", path: "../../../node_modules/@capacitor/filesystem")|.package(name: "CapacitorFilesystem", path: "../../../node_modules/@capacitor/filesystem"),\n        .package(name: "RevenuecatPurchasesCapacitor", path: "../../../node_modules/@revenuecat/purchases-capacitor")|' Package.swift
            # Adicionar target dependency
            sed -i '' 's|.product(name: "CapacitorFilesystem", package: "CapacitorFilesystem")|.product(name: "CapacitorFilesystem", package: "CapacitorFilesystem"),\n                .product(name: "RevenuecatPurchasesCapacitor", package: "RevenuecatPurchasesCapacitor")|' Package.swift
            echo "RevenueCat added to Package.swift"
          else
            echo "RevenueCat already in Package.swift"
          fi
          cat Package.swift

      - name: Verify RevenueCat in Package.swift
        script: |
          echo "=== Package.swift after cap sync ==="
          cat ios/App/CapApp-SPM/Package.swift
          echo ""
          echo "=== Checking for RevenueCat ==="
          grep -i revenuecat ios/App/CapApp-SPM/Package.swift && echo "RevenueCat: FOUND" || echo "RevenueCat: NOT FOUND"

      - name: Patch iOS config for AdMob
        script: |
          set -ex
          # Substituir AdMob App ID do Android pelo iOS no capacitor.config.json
          cd ios/App/App
          sed -i '' 's/ca-app-pub-9316035916536420~4807390224/ca-app-pub-9316035916536420~7457000023/g' capacitor.config.json
          echo "AdMob App ID patched for iOS:"
          cat capacitor.config.json | grep -i admob || true

      - name: Setup iOS code signing
        script: |
          set -ex
          # Generate RSA private key for certificate creation
          openssl genrsa -out /tmp/cert_key.pem 2048
          export CERTIFICATE_PRIVATE_KEY="$(cat /tmp/cert_key.pem)"

          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles --project ios/App/App.xcodeproj

      - name: Set version
        script: |
          cd ios/App
          agvtool new-marketing-version 1.5.1
          agvtool new-version -all 41
          # Fallback: forçar no pbxproj diretamente
          sed -i '' 's/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = 41/g' App.xcodeproj/project.pbxproj
          echo "Build version set to:"
          grep CURRENT_PROJECT_VERSION App.xcodeproj/project.pbxproj

      - name: Build IPA
        script: |
          set -ex
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
