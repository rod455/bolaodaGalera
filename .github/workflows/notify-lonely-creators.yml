name: Notify Lonely Creators

on:
  # DESATIVADO ATÉ VIRAR O MÊS (limite de minutos atingido)
  # schedule:
  #   - cron: '0 13 * * 1'
  workflow_dispatch:

jobs:
  notify-lonely-creators:
    runs-on: ubuntu-latest
    steps:
      - name: Notificar criadores solitarios
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${SUPABASE_URL}/functions/v1/notify-lonely-creators" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          echo "Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" -ge 400 ]; then
            echo "::error::Falha (HTTP $http_code)"
            exit 1
          fi
