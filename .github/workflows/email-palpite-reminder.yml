name: Email Palpite Reminder

on:
  # DESATIVADO ATÉ VIRAR O MÊS (limite de minutos atingido)
  # schedule:
  #   - cron: '0 11,15,19,23 * * *'
  workflow_dispatch:

jobs:
  send-email-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar lembretes por email (12h antes)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${SUPABASE_URL}/functions/v1/send-palpite-reminder" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')

          echo "Email Reminder - Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ge 400 ]; then
            echo "::error::Falha nos lembretes por email (HTTP $http_code)"
            exit 1
          fi
