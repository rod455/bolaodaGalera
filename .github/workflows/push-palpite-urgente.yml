name: Push Palpite Urgente

on:
  schedule:
    # A cada 30min (pega jogos na próxima 1h)
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  send-push-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar push urgente (1h antes)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${SUPABASE_URL}/functions/v1/push-palpite-urgente" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json")
          
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          
          echo "📲 Push Reminder - Status: $http_code"
          echo "Response: $body"
          
          if [ "$http_code" -ge 400 ]; then
            echo "::error::Falha no push urgente (HTTP $http_code)"
            exit 1
          fi
