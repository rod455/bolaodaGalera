name: Sync Live Scores

on:
  # Roda a cada 3 minutos durante horários de jogos (17h-00h BRT = 20h-03h UTC)
  schedule:
    - cron: '*/3 20-23 * * *'  # 17h-20h BRT
    - cron: '*/3 0-3 * * *'    # 21h-00h BRT
  # Permite rodar manualmente pelo GitHub
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @supabase/supabase-js

      - name: Run live sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node sync-jogos-ci.mjs --live
